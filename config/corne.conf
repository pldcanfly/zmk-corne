# --- Display ---
CONFIG_ZMK_DISPLAY=y

# --- RGB Underglow (enabled now that we run on USB power) ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
# Restore last RGB state (on/off, color, brightness) across reboots
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# --- Power / Idle ---
# On USB power deep sleep is less important. Keeping a long idle timeout so the
# display/RGB don't blank too aggressively. Raise/remove if you don't want sleep.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_IDLE_TIMEOUT=120000
